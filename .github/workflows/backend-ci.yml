name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'antisatta-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'antisatta-backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antisatta-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: matchmarket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/matchmarket_test
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      FRONTEND_URL: http://localhost:3000
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: antisatta-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test -- --coverage

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Build
        run: npm run build
