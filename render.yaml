databases:
  - name: matchmarket-db
    plan: starter
    databaseName: matchmarket
    user: matchmarket
    ipAllowList: []

services:
  - type: web
    name: matchmarket-api
    plan: starter
    runtime: node
    region: oregon
    rootDir: antisatta-backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: matchmarket-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
